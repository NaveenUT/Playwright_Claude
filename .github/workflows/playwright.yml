name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  playwright-tests:
    name: Playwright Tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        id: smoke
        run: npm run test:smoke -- --project=chromium
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://www.henryschein.co.uk' }}
          DOMAIN: ${{ vars.DOMAIN || 'UK Medical' }}
          HEADLESS: 'true'

      - name: Run regression tests
        if: success()
        run: npm run test:regression -- --project=chromium
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://www.henryschein.co.uk' }}
          DOMAIN: ${{ vars.DOMAIN || 'UK Medical' }}
          HEADLESS: 'true'

      - name: Upload Playwright HTML report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
        if: always()

      - name: Upload report to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: playwright-report/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        if: always()
