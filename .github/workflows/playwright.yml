name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # every day at 06:00 UTC

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      summary: ${{ steps.parse.outputs.summary }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        run: npm run test:smoke -- --project=chromium
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://www.henryschein.co.uk' }}
          DOMAIN: ${{ vars.DOMAIN || 'UK Medical' }}
          HEADLESS: 'true'

      - name: Run regression tests
        if: success()
        run: npm run test:regression -- --project=chromium
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://www.henryschein.co.uk' }}
          DOMAIN: ${{ vars.DOMAIN || 'UK Medical' }}
          HEADLESS: 'true'

      - name: Parse test results
        if: always()
        id: parse
        run: |
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('results.json')) {
              const msg = 'No results file found (smoke tests may have failed before regression ran).';
              fs.appendFileSync(process.env.GITHUB_OUTPUT, 'summary<<ENDSUMMARY\n' + msg + '\nENDSUMMARY\n');
              process.exit(0);
            }
            const r = JSON.parse(fs.readFileSync('results.json', 'utf8'));
            const stats = r.stats || {};
            const passed  = stats.expected  || 0;
            const failed  = stats.unexpected || 0;
            const flaky   = stats.flaky      || 0;
            const skipped = stats.skipped    || 0;
            const total   = passed + failed + flaky + skipped;

            function collectTests(suites, list) {
              for (const suite of suites || []) {
                for (const test of suite.tests || []) {
                  const icon = test.status === 'expected' ? 'PASS' :
                               test.status === 'skipped'  ? 'SKIP' : 'FAIL';
                  list.push(icon + ' | ' + test.title);
                }
                collectTests(suite.suites, list);
              }
            }
            const tests = [];
            collectTests(r.suites, tests);

            const lines = [
              'Total   : ' + total,
              'Passed  : ' + passed,
              'Failed  : ' + (failed + flaky),
              'Skipped : ' + skipped,
              '',
              'Test Details:',
              ...tests
            ];

            const summary = lines.join('\n');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'summary<<ENDSUMMARY\n' + summary + '\nENDSUMMARY\n');
          "

      - name: Merge reports for GitHub Pages
        if: always()
        run: |
          mkdir -p gh-pages/playwright-report
          mkdir -p gh-pages/monocart-report
          cp -r playwright-report/. gh-pages/playwright-report/ 2>/dev/null || true
          cp -r monocart-report/. gh-pages/monocart-report/ 2>/dev/null || true
          cat <<'EOF' > gh-pages/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <title>Henry Schein – Test Reports</title>
            <style>
              body { font-family: sans-serif; display: flex; flex-direction: column;
                     align-items: center; justify-content: center; height: 100vh; margin: 0;
                     background: #f5f5f5; }
              h1 { color: #333; margin-bottom: 2rem; }
              .cards { display: flex; gap: 2rem; }
              .card { background: white; border-radius: 10px; padding: 2rem 3rem;
                      text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.12);
                      text-decoration: none; color: #333; transition: transform 0.2s; }
              .card:hover { transform: translateY(-4px); }
              .card h2 { margin: 0 0 0.5rem; font-size: 1.3rem; }
              .card p { margin: 0; color: #777; font-size: 0.9rem; }
              .badge { display: inline-block; margin-top: 1rem; padding: 0.3rem 0.8rem;
                       border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
              .badge-blue { background: #e3f0ff; color: #1a6fcc; }
              .badge-green { background: #e3ffe8; color: #1a8c35; }
            </style>
          </head>
          <body>
            <h1>Henry Schein – Playwright Test Reports</h1>
            <div class="cards">
              <a class="card" href="monocart-report/index.html">
                <h2>Monocart Report</h2>
                <p>Charts · Duration bars · Tag breakdown</p>
                <span class="badge badge-green">With Charts</span>
              </a>
              <a class="card" href="playwright-report/index.html">
                <h2>Playwright Report</h2>
                <p>Trace viewer · Steps · Video · Screenshots</p>
                <span class="badge badge-blue">Detailed Trace</span>
              </a>
            </div>
          </body>
          </html>
          EOF

      - name: Upload Playwright report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Monocart report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monocart-report-${{ github.run_number }}
          path: monocart-report/
          retention-days: 30

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: gh-pages/

  deploy-report:
    name: Publish Report to GitHub Pages
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  send-email:
    name: Send Email Report
    needs: [test, deploy-report]
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Send test report email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: Playwright CI <${{ secrets.MAIL_USERNAME }}>
          subject: "${{ needs.test.result == 'success' && 'Playwright Tests Passed' || 'Playwright Tests Failed' }} — Run #${{ github.run_number }}"
          body: |
            Playwright Automation Test Results
            ===================================

            Repository  : ${{ github.repository }}
            Branch      : ${{ github.ref_name }}
            Triggered by: ${{ github.event_name }}
            Status      : ${{ needs.test.result == 'success' && 'PASSED' || 'FAILED' }}
            Run Number  : #${{ github.run_number }}

            Results Summary:
            ----------------
            ${{ needs.test.outputs.summary }}

            View Reports:
            -------------
            Landing Page  : https://naveenUT.github.io/Playwright_Claude/
            Monocart      : https://naveenUT.github.io/Playwright_Claude/monocart-report/
            Playwright    : https://naveenUT.github.io/Playwright_Claude/playwright-report/

            Workflow Run Details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ---
            This is an automated message from GitHub Actions.
