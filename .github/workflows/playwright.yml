name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      summary: ${{ steps.parse.outputs.summary }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        run: npm run test:smoke -- --project=chromium
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://www.henryschein.co.uk' }}
          DOMAIN: ${{ vars.DOMAIN || 'UK Medical' }}
          HEADLESS: 'true'

      - name: Run regression tests
        if: success()
        run: npm run test:regression -- --project=chromium --reporter=html,json
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://www.henryschein.co.uk' }}
          DOMAIN: ${{ vars.DOMAIN || 'UK Medical' }}
          HEADLESS: 'true'
          PLAYWRIGHT_JSON_OUTPUT_NAME: results.json

      - name: Parse test results
        if: always()
        id: parse
        run: |
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('results.json')) {
              const msg = 'No results file found (smoke tests may have failed before regression ran).';
              fs.appendFileSync(process.env.GITHUB_OUTPUT, 'summary<<ENDSUMMARY\n' + msg + '\nENDSUMMARY\n');
              process.exit(0);
            }
            const r = JSON.parse(fs.readFileSync('results.json', 'utf8'));
            const stats = r.stats || {};
            const passed  = stats.expected  || 0;
            const failed  = stats.unexpected || 0;
            const flaky   = stats.flaky      || 0;
            const skipped = stats.skipped    || 0;
            const total   = passed + failed + flaky + skipped;

            function collectTests(suites, list) {
              for (const suite of suites || []) {
                for (const test of suite.tests || []) {
                  const icon = test.status === 'expected' ? 'PASS' :
                               test.status === 'skipped'  ? 'SKIP' : 'FAIL';
                  list.push(icon + ' | ' + test.title);
                }
                collectTests(suite.suites, list);
              }
            }
            const tests = [];
            collectTests(r.suites, tests);

            const lines = [
              'Total   : ' + total,
              'Passed  : ' + passed,
              'Failed  : ' + (failed + flaky),
              'Skipped : ' + skipped,
              '',
              'Test Details:',
              ...tests
            ];

            const summary = lines.join('\n');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'summary<<ENDSUMMARY\n' + summary + '\nENDSUMMARY\n');
          "

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: playwright-report/

  deploy-report:
    name: Publish Report to GitHub Pages
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  send-email:
    name: Send Email Report
    needs: [test, deploy-report]
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Send test report email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: Playwright CI <${{ secrets.MAIL_USERNAME }}>
          subject: "${{ needs.test.result == 'success' && 'Playwright Tests Passed' || 'Playwright Tests Failed' }} — Run #${{ github.run_number }}"
          body: |
            Playwright Automation Test Results
            ===================================

            Repository  : ${{ github.repository }}
            Branch      : ${{ github.ref_name }}
            Triggered by: ${{ github.event_name }}
            Status      : ${{ needs.test.result == 'success' && 'PASSED' || 'FAILED' }}
            Run Number  : #${{ github.run_number }}

            Results Summary:
            ----------------
            ${{ needs.test.outputs.summary }}

            View Full HTML Report:
            https://naveenUT.github.io/Playwright_Claude/

            Workflow Run Details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ---
            This is an automated message from GitHub Actions.
