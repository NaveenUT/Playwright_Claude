name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        run: npm run test:smoke -- --project=chromium
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://www.henryschein.co.uk' }}
          DOMAIN: ${{ vars.DOMAIN || 'UK Medical' }}
          HEADLESS: 'true'

      - name: Run regression tests
        if: success()
        run: npm run test:regression -- --project=chromium
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://www.henryschein.co.uk' }}
          DOMAIN: ${{ vars.DOMAIN || 'UK Medical' }}
          HEADLESS: 'true'

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: playwright-report/

  deploy-report:
    name: Publish Report to GitHub Pages
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  send-email:
    name: Send Email Report
    needs: [test, deploy-report]
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Send test report email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: Playwright CI <${{ secrets.MAIL_USERNAME }}>
          subject: "${{ needs.test.result == 'success' && 'Playwright Tests Passed' || 'Playwright Tests Failed' }} — Run #${{ github.run_number }}"
          body: |
            Playwright Automation Test Results
            ===================================

            Repository  : ${{ github.repository }}
            Branch      : ${{ github.ref_name }}
            Triggered by: ${{ github.event_name }}
            Status      : ${{ needs.test.result == 'success' && 'PASSED ' || 'FAILED ' }}
            Run Number  : #${{ github.run_number }}

            View Full HTML Report:
            https://naveenUT.github.io/Playwright_Claude/

            Workflow Run Details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ---
            This is an automated message from GitHub Actions.
